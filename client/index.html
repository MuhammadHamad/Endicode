<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Endicode</title>
    <meta name="description" content="Modern web/app development and AI automation services. We craft conversion-ready web apps and wire in automation that cuts cost, clicks, and chaos.">
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

<!-- OpenGraph -->
    <meta property="og:title" content="Endicode">
    <meta property="og:description" content="Modern web/app development and AI automation services.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://endicode.com">
    <meta property="og:image" content="/og.png">
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Endicode",
      "url": "https://endicode.com",
      "description": "Modern web/app development and AI automation services"
    }
    </script>
    
    <link rel="canonical" href="https://endicode.com">
    <!-- Favicon -->
    <style>
      /* Remove any filters to show original logo color */
      link[rel*="icon"] {
        filter: none;
      }
    </style>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx?v=1"></script>
    <!--Start of Tawk.to Script (deferred until after load + idle) -->
    <script type="text/javascript">
    var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
    function loadTawk(){
      if (window.__tawkLoaded) return;
      window.__tawkLoaded = true;
      var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
      s1.async=true;
      s1.src='https://embed.tawk.to/69307d4c7eb84f197c793f5a/1jbimitpm';
      s1.charset='UTF-8';
      s1.setAttribute('crossorigin','*');
      s0.parentNode.insertBefore(s1,s0);
    }
    // Hold the chat widget back so it never competes with first paint /
    // interactivity. Load on idle after window load, or on first interaction.
    window.addEventListener('load', function(){
      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadTawk, { timeout: 4000 });
      } else {
        setTimeout(loadTawk, 3000);
      }
    });
    ['scroll','mousemove','touchstart','click'].forEach(function(evt){
      window.addEventListener(evt, loadTawk, { once: true, passive: true });
    });
    </script>
    <!--End of Tawk.to Script-->
  </body>
</html>
